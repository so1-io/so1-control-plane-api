name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Build TypeScript
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Test (placeholder)
        run: echo "Tests coming in TASKSET 9"

      - name: Build Docker image (optional)
        run: docker build -t so1-control-plane-api:latest .
        continue-on-error: true
