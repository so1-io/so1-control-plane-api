version: "3.8"

services:
  # so1-control-plane-api (BFF)
  bff:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      N8N_API_KEY: ${N8N_API_KEY}
      N8N_BASE_URL: ${N8N_BASE_URL}
    volumes:
      - ./src:/app/src
    command: npm run dev
    restart: unless-stopped

  # so1-console (Frontend) - optional, run separately
